<!DOCTYPE html><html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Qeydiyyatlar | AN Psixoloji</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="assets/style.css?v=20260714h">
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#6A0000"><link rel="apple-touch-icon" href="icon-192.png"><link rel="icon" type="image/png" href="icon-192.png">
<style>
.admin-wrap{max-width:900px;margin:0 auto;padding:100px 24px 60px}
.pin-box{max-width:340px;margin:120px auto;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);
  padding:32px 28px;box-shadow:var(--shadow-lg);text-align:center}
.pin-box input{width:100%;font-size:1.1rem;text-align:center;letter-spacing:.15em;padding:12px;
  border:1px solid var(--line);border-radius:10px;margin:16px 0;font-family:'JetBrains Mono',monospace}
.pin-err{color:var(--low,#b34242);font-size:.85rem;min-height:1.2em}
.admin-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--r);overflow:hidden;
  box-shadow:var(--shadow-sm);margin-top:20px}
.admin-table th{background:var(--cream);color:var(--bordo);text-align:left;padding:12px 16px;font-size:.82rem;
  text-transform:uppercase;letter-spacing:.04em}
.admin-table td{padding:12px 16px;border-top:1px solid var(--line);font-size:.92rem}
.admin-table tr:hover td{background:var(--paper)}
.admin-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:6px}
.admin-count{background:var(--bordo);color:#fff;border-radius:999px;padding:5px 14px;font-size:.82rem;font-weight:700}
.reg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-top:20px}
.reg-card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px;
  box-shadow:var(--shadow-sm);transition:.2s ease;position:relative}
.reg-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.reg-card .rc-name{font-family:'Spectral',serif;font-size:1.1rem;color:var(--bordo);font-weight:700;margin-bottom:10px;padding-right:64px}
.reg-card .rc-row{display:flex;align-items:center;gap:8px;font-size:.88rem;color:var(--ink-2);margin-top:7px}
.reg-card .rc-row svg{width:15px;height:15px;flex-shrink:0;color:var(--teal-2)}
.reg-card .rc-tag{position:absolute;top:18px;right:18px;font-size:.68rem;font-weight:800;letter-spacing:.03em;
  padding:4px 10px;border-radius:999px;text-transform:uppercase}
.reg-card .rc-tag.sms{background:var(--teal-soft);color:var(--teal-2)}
.reg-card .rc-tag.bypass{background:var(--gold-soft);color:var(--gold-2)}
#adminSearch{max-width:260px}
.empty-note{text-align:center;padding:40px;color:var(--ink-2)}
</style>
</head><body>
<header class="nav"><div class="wrap nav-in"><a href="index.html" class="brand" onclick="handleLogoTap(event)"><img src="logo.png" alt="AN Psixoloji Dəstək və Reabilitasiya Mərkəzi" class="logo-img"><span>AN Psixoloji<small>ABA Terapiya Platforması</small></span></a><div class="lang-switch"></div><button class="burger" onclick="toggleNav()" aria-label="Menyu">☰</button><nav class="nav-links" id="navLinks"><a href="index.html" data-i18n="nav_home">Ana səhifə</a><a href="qiymetlendirmeler.html" data-i18n="nav_assess">Qiymətləndirmələr</a><a href="proqram.html" class="cta" data-i18n="nav_program">Fərdi proqram</a></nav></div></header>

<div id="pinScreen" class="pin-box">
  <h3 style="margin-bottom:4px">Admin girişi</h3>
  <p class="muted" style="font-size:.9rem">Qeydiyyatdan keçənlərin siyahısını görmək üçün PIN daxil edin.</p>
  <input id="pinInput" type="password" placeholder="PIN" autocomplete="off" autocapitalize="characters">
  <div class="pin-err" id="pinErr"></div>
  <button class="btn btn-primary btn-block" onclick="checkPin()">Daxil ol</button>
</div>

<main id="adminMain" class="admin-wrap" style="display:none">
  <div class="admin-top">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <h2 style="margin:0">Qeydiyyatdan keçənlər</h2>
      <span class="admin-count" id="regCount">0</span>
      <span class="admin-count" id="regRealCount" style="background:var(--teal)">0 SMS</span>
      <span class="admin-count" id="regBypassCount" style="background:var(--gold-2)">0 sınaq</span>
    </div>
    <input id="adminSearch" type="text" placeholder="Ad, iş yeri və ya nömrə axtar..." oninput="renderTable()">
  </div>
  <div class="reg-grid" id="regBody"></div>
  <div class="empty-note" id="emptyNote" style="display:none">Hələ heç kim qeydiyyatdan keçməyib.</div>
</main>

<script src="assets/i18n.js?v=20260714h"></script>
<script src="assets/core.js?v=20260714h"></script>
<script>
const ADMIN_PIN = "AN2026EA";
let allRegs = [];

function checkPin(){
  const v = document.getElementById('pinInput').value.trim();
  if(v !== ADMIN_PIN){ document.getElementById('pinErr').textContent = 'Yanlış PIN.'; return; }
  document.getElementById('pinScreen').style.display='none';
  document.getElementById('adminMain').style.display='block';
  loadRegs();
}
document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPin(); });

async function loadRegs(){
  await abaEnsureFirebase();
  firebase.database().ref('aba_terapiya/registrations').on('value', snap=>{
    const val = snap.val() || {};
    allRegs = Object.values(val).sort((a,b)=>(b.ts||0)-(a.ts||0));
    renderTable();
  });
}
function renderTable(){
  const q = (document.getElementById('adminSearch').value||'').toLowerCase();
  const filtered = allRegs.filter(r =>
    (r.adSoyad||'').toLowerCase().includes(q) ||
    (r.isYeri||'').toLowerCase().includes(q) ||
    (r.phone||'').toLowerCase().includes(q)
  );
  const bypassCount = allRegs.filter(r=>r.bypass).length;
  document.getElementById('regCount').textContent = allRegs.length + ' toplam';
  document.getElementById('regRealCount').textContent = (allRegs.length - bypassCount) + ' SMS';
  document.getElementById('regBypassCount').textContent = bypassCount + ' sınaq';
  document.getElementById('emptyNote').style.display = filtered.length ? 'none' : 'block';
  const icWork='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';
  const icPhone='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3-8.6A2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.5 2.1L8.1 9.9a16 16 0 006 6l1.5-1.1a2 2 0 012.1-.5c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z"/></svg>';
  const icDate='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>';
  document.getElementById('regBody').innerHTML = filtered.map(r => {
    const d = r.ts ? new Date(r.ts).toLocaleDateString('az-AZ',{year:'numeric',month:'short',day:'numeric'}) : '—';
    const tag = r.bypass ? '<span class="rc-tag bypass">Sınaq</span>' : '<span class="rc-tag sms">SMS</span>';
    return `<div class="reg-card">${tag}<div class="rc-name">${esc(r.adSoyad)}</div>
      <div class="rc-row">${icWork}<span>${esc(r.isYeri)}</span></div>
      <div class="rc-row">${icPhone}<span>${esc(r.phone)}</span></div>
      <div class="rc-row">${icDate}<span>${d}</span></div></div>`;
  }).join('');
}
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
</script>
</body></html>
